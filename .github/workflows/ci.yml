# Build + unit tests on every PR and on main. Pair with branch protection:
# Settings → Branches → Add rule for `main` → require this check, require PR.
# Do not pass CODE_SIGNING_ALLOWED=NO — macOS test bundles need ad-hoc signing to launch.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    # macOS 26 + Xcode 26 (e.g. SwiftUI `.glassEffect()`); macos-15 images only ship Xcode 16.x.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Build and test
        run: |
          set -eo pipefail
          for attempt in 1 2 3; do
            # `if cmd; then` so a failing xcodebuild does not trip `set -e` before we read $?.
            # (A bare `xcodebuild … && break` exits the whole step on failure and skips the retry.)
            if xcodebuild \
              -project Binky.xcodeproj \
              -scheme Binky \
              -configuration Debug \
              -destination 'platform=macOS' \
              CODE_SIGN_IDENTITY=- \
              CODE_SIGNING_REQUIRED=NO \
              test
            then
              break
            fi
            status=$?
            if [ "$status" -ne 65 ] || [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            echo "xcodebuild exited 65 (LaunchServices test-runner flake on GitHub macOS). Sleeping 5s before attempt $((attempt + 1)) of 3…"
            sleep 5
          done
